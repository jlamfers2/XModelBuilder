name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore XModelBuilder.sln

      - name: Build
        run: dotnet build XModelBuilder.sln --no-restore -c Release

      # Only the unit-test projects run here. The demo integration tests
      # (Demo/XModelBuilder.Demo.Shop.IntegrationTests) need SQL Server and
      # are intentionally excluded from CI. Each run collects line/branch
      # coverage (coverlet) into ./coverage as Cobertura XML.
      - name: Test
        run: |
          dotnet test XModelBuilder.UnitTests            -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test XModelBuilder.Fakers.UnitTests     -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test XModelBuilder.Reqnroll.UnitTests   -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test XModelBuilder.SpecFlow.UnitTests   -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
